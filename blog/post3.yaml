layout: "common"
id: "yumeLog-intro"
time: "20260306"
title: "YumeLog：我写的高颜值个性化主页系统"
blocks:
  - type: "text"
    content: |
      最近我把自己的个人主页系统整理并开源了，项目名字叫做 $$bold(yumeLog)$$（ユメログ）。
      $$center($$bold(一个专门为个人主页打造的极简博客系统)$$)$$
      项目基于 $$bold(Vue3 + TypeScript + NaiveUI)$$ 开发，目标不是做传统博客，而是做一个 $$underline(更像“个人数字名片”的网站)$$。GitHub 地址：$$link(https://github.com/chiba233/YumeLog | $$bold(点我查看项目仓库)$$)$$

  - type: "image"
    content:
      - src: "https://raw.githubusercontent.com/chiba233/mainpageData/refs/heads/master/blog/img/post3/home-laptop.webp"
        spareUrl: "/data/blog/img/post3/home-laptop.webp"
        desc: "yumeLog Home 桌面端预览"

      - src: "https://raw.githubusercontent.com/chiba233/mainpageData/refs/heads/master/blog/img/post3/home-phone.webp"
        spareUrl: "/data/blog/img/post3/home-phone.webp"
        desc: "yumeLog Home 移动端预览"

  - type: "text"
    content: |
      $$center($$bold(为什么写这个项目？)$$)$$
      我一直觉得大部分博客系统都存在几个问题：首先还是不符合我胃口，不是太好看。其次是比较重，大多需要后端，部署复杂，维护火葬场。个人信息展示能力很弱。所以我干脆自己写了一套系统：$$bold(一个完全静态的个人主页 + 博客系统)$$。没有后端，没有数据库，只需要托管静态文件即可运行。担心国内被劫持访问不了？没关系支持热备。
  - type: "divider"
  - type: "text"
    content: |
      $$center($$bold(核心技术特点)$$)$$
      $$bold(自研文本解析引擎)$$：项目没有使用 Markdown，而是自己写了一套轻量级解析器。支持：$$code(bold  underline  strike  center  link  thin code info warning )$$。而且支持 $$bold(无限嵌套)$$。你可以使用$$code(- type: "divider")$$为文本进行分段，也可以用$$code(- type: "image")$$为文章添加图片和描述。
      $$info(示例 yaml | id: "test"       # id为访问网页的地址host/blog/test
      time: "20260106" # 年月日
      pin: true        # pin值以将重要文章置顶
      title: "test"    # 标题
      blocks:          # block后为正文
        - type: "text"
          content: "这是测试文本"
      # 3. 图像渲染块 (支持容灾备用链接)
        - type: "image"
          content:
          - src: /background0.webp
            spareUrl: /background0.webp
            desc: "这是图片描述"
        - type: "divider")$$
  - type: "image"
    content:
     - src: "https://raw.githubusercontent.com/chiba233/mainpageData/refs/heads/master/blog/img/post3/blog-laptop.webp"
       spareUrl: "/data/blog/img/post3/blog-laptop.webp"
       desc: "yumeLog Blog 桌面端预览"
     - src: "https://raw.githubusercontent.com/chiba233/mainpageData/refs/heads/master/blog/img/post3/blog-phone.webp"
       spareUrl: "/data/blog/img/post3/blog-phone.webp"
       desc: "yumeLog Blog 移动端预览"

  - type: "text"
    content: |
      $$bold(YAML 内容驱动)$$：博客文章全部使用 YAML 编写，例如：$$code(id / time / title / blocks)$$，每个文章由多个 $$bold(block)$$ 组成。支持： $$underline(文本块  图片块  多图片展示)$$。因为是纯数据驱动，所以：$$center($$bold(不需要数据库，也不需要后端)$$)$$

  - type: "text"
    content: |
      $$bold(完全静态架构)$$：所有数据都来自仓库文件：$$cod(YAML  JSON  图片资源)$$，所以部署非常简单：$$code(GitHub Pages Cloudflare Pages Vercel Nginx)$$都可以直接部署。

  - type: "text"
    content: |
      $$bold(个人主页模块)$$:除了博客系统之外，yumeLog 还包含完整的个人展示模块：$$underline(主题系统 多语言支持 纪念日时间线 友链展示 联系方式 照片墙)$$,本质上它更像是：$$center($$bold(一个完整的个人网站框架)$$)$$
  - type: "image"
    content:
      - src: "https://raw.githubusercontent.com/chiba233/mainpageData/refs/heads/master/blog/img/post3/memory.webp"
        spareUrl: "/data/blog/img/post3/memory.webp"
        desc: "纪念日预览"
      - src: "https://raw.githubusercontent.com/chiba233/mainpageData/refs/heads/master/blog/img/post3/neko.webp"
        spareUrl: "/data/blog/img/post3/neko.webp"
        desc: "照片展示墙预览"

  - type: "text"
    content: |
      $$bold(Maimai 玩家模块)$$：如果你是WMC，这个功能会非常有意思。项目原生支持：$$bold(Maimai DX 成绩展示)$$可以在主页直接展示你的：$$code(段位 Rating 成绩列表)$$，数据来自 Aqua 服务器 API。

  - type: "image"
    content:
      - src: "https://raw.githubusercontent.com/chiba233/mainpageData/refs/heads/master/blog/img/post3/maimai.webp"
